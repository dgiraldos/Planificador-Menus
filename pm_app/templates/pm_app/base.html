<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Planificador de Menús{% endblock %}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f4f4;
        }

        nav {
            background: #333;
            padding: 15px;
            border-radius: 8px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin-top: 15px;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
        }

        th {
            background: #333;
            color: white;
        }
    </style>
</head>
<body>

    <nav>
        <a href="{% url 'pm_app:index' %}">Inicio</a>
        <a href="{% url 'pm_app:comidas' %}">Comidas</a>
        <a href="{% url 'pm_app:planificacion' %}">Planificación</a>
    </nav>

    {% block content %}
    {% endblock %}

</body>
</html>
